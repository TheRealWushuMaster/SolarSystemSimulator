# Nginx server block for solarasim.space, alongside your other sites.
#
# Install: copy this to /etc/nginx/sites-available/solarasim.space,
# symlink it into sites-enabled, then run `sudo certbot --nginx -d
# solarasim.space` -- certbot rewrites this block in place to add the
# SSL certificate lines and an HTTP->HTTPS redirect, so there's no TLS
# config to hand-write here.
#
# Adjust the two paths below (root/alias) to wherever this repo is
# actually cloned on the VPS.

server {
    listen 80;
    server_name solarasim.space;

    root /opt/solara/web/dist;
    index index.html;

    # Served directly by Nginx -- textures never touch the Python process.
    location /textures/ {
        alias /opt/solara/textures/;
        expires 7d;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket upgrade headers -- without these, the tick/state stream
    # never connects (Nginx defaults to plain HTTP proxying).
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        # A tick every rendered frame is a lot of short-lived traffic on one
        # connection; keep it open rather than timing out mid-flight.
        proxy_read_timeout 3600s;
    }

    # The built Vite SPA. try_files falls back to index.html for any route
    # that isn't a static asset -- there's currently only one route, but this
    # keeps a refresh from 404ing if client-side routing is ever added.
    location / {
        try_files $uri /index.html;
    }
}
